# greenAI API reverse proxy
# Auto-generated by deploy.sh - do not edit manually
# Re-run deploy.sh to regenerate after env changes.

upstream greenai {
    server 127.0.0.1:${api_port};
}
server {
    listen 80;
    listen [::]:80;
    server_name greenai.mochipal.site;
    return 301 https://$server_name$request_uri;
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name greenai.mochipal.site;
    ssl_certificate     /etc/nginx/ssl/mochipal.site.crt;
    ssl_certificate_key /etc/nginx/ssl/mochipal.site.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
     # === 健康检查（微信不调用，但保留给运维 / LB 探活） ===
    location = /health {
        access_log off;
        proxy_pass http://greenai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === API 代理 ===
    location / {
        proxy_pass http://greenai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fastify 使用 SSE / 长连接场景预留（当前未使用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时（微信服务回调等场景）
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # 请求体上限（拍照识别 / 诊断，图片最大 ~5MB）
        client_max_body_size 10m;
    }
}
